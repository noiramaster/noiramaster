name: Generator

on:
  schedule:
    - cron: '30 */3 * * *'
  workflow_dispatch:

jobs:
  limits-check:
    runs-on: ubuntu-latest
    outputs:
      paused: ${{ steps.check.outputs.paused }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install check dependencies
        run: npm install @supabase/supabase-js
      - name: Check free tier limits
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/check-limits.js && echo "paused=false" >> $GITHUB_OUTPUT || echo "paused=true" >> $GITHUB_OUTPUT

  generate:
    needs: limits-check
    if: needs.limits-check.outputs.paused != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          cd generator
          npm ci
      - name: Run generator
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIRECCION_FISICA: ${{ secrets.DIRECCION_FISICA }}
        run: |
          cd generator
          npm run dev
